name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Java 17 with caching for speed
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin' # "temurin" is the recommended OpenJDK distribution
          cache: 'maven'          # Automatically caches your ~/.m2 dependencies

      # 3. Build and Test
      - name: Build with Maven
        run: mvn -B test --file pom.xml