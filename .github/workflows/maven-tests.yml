name: Java CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Configura JDK 17
        # We give this step an ID so we can reference its outputs
        id: setup-jdk
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Debug Java Version
        # This confirms exactly what the runner is seeing
        run: |
          echo "JAVA_HOME is: $JAVA_HOME"
          java -version
          mvn -version

      - name: Compila i executa proves
        # We explicitly point Maven to the JAVA_HOME we just set up
        run: mvn -B test -D"java.home=${{ steps.setup-jdk.outputs.path }}"