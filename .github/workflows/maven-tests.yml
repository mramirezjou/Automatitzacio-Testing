name: Java CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Descarrega el codi
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # Ensures the shell script is executable if you have a wrapper
      - name: Make mvnw executable
        run: chmod +x mvnw
        continue-on-error: true

      - name: Check Environment
        run: |
          java -version
          mvn -version

      - name: Compila i executa proves
        run: mvn -B test